# ===============================
# Server
# ===============================
server.port=8081

# ===============================
# MySQL Database
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/videofetcher_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# Disable H2 (IMPORTANT)
# ===============================
spring.h2.console.enabled=false

# ===============================
# YouTube API Config
# ===============================
youtube.api.key=AIzaSyAKVEcyiqWqXJYmeHlIrKshx8AaNl9imys
youtube.search.queries=java,spring boot
youtube.fetch.max-results=10
youtube.fetch.interval=60000
youtube.fetch.enabled=true
